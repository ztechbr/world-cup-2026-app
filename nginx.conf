server {
    listen 80;
    server_name localhost;

    # Serve static frontend files
    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        try_files $uri $uri/ /index.html;
    }

    # Reverse proxy for the World Cup API to bypass CORS
    location /api/ {
        proxy_pass https://ai-worldcup26.jd0rwz.easypanel.host/;
        proxy_set_header X-Token "COPA26!";
        proxy_ssl_server_name on;
        proxy_ssl_protocols TLSv1.2 TLSv1.3;
        
        # Enable CORS headers on proxy response
        add_header Access-Control-Allow-Origin *;
        add_header Access-Control-Allow-Methods "GET, OPTIONS";
        add_header Access-Control-Allow-Headers "X-Requested-With, Content-Type, Origin, Authorization, Accept, Client-Security-Token, Accept-Encoding";
    }

    # Reverse proxy for Streamlit stats service (baseUrlPath=stats)
    # Using Docker Compose internal service name: worldcup-stats
    location /stats {
        resolver 127.0.0.11 valid=10s ipv6=off;
        set $stats_upstream worldcup-stats;
        proxy_pass http://$stats_upstream:90;

        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;
        proxy_buffering off;
    }

    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
